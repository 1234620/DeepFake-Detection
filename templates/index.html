<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .upload-text {
            color: #667eea;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f0f2ff;
            border-radius: 10px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .analyze-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            margin-top: 10px;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .result.show {
            display: block;
        }

        .result.fake {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
        }

        .result.real {
            background: linear-gradient(135deg, #51cf66 0%, #37b24d 100%);
            color: white;
        }

        .result-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .result-text {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .result-confidence {
            font-size: 1.3em;
            margin-bottom: 20px;
        }

        .result-details {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 1.1em;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #667eea;
            border: 2px solid white;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 15px;
        }

        .reset-btn:hover {
            background: transparent;
            color: white;
        }

        .error {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #ff6b6b;
            color: white;
            border-radius: 10px;
            text-align: center;
        }

        .error.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .upload-area {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Deepfake Detector</h1>
        <p class="subtitle">Upload an image or video to analyze</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click to upload or drag & drop</div>
            <div class="upload-hint">Supports: JPG, PNG, GIF, MP4, AVI, MOV (Max 100MB)</div>
            <input type="file" id="fileInput" accept="image/*,video/*">
        </div>

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <button class="analyze-btn" id="analyzeBtn">🔬 Analyze for Deepfakes</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing... This may take a moment.</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-text" id="resultText"></div>
            <div class="result-confidence" id="resultConfidence"></div>
            
            <div class="result-details">
                <div class="detail-row">
                    <span>Real Probability:</span>
                    <span id="realProb"></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="realProgress"></div>
                </div>
                
                <div class="detail-row">
                    <span>Fake Probability:</span>
                    <span id="fakeProb"></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="fakeProgress"></div>
                </div>

                <div id="videoDetails" style="margin-top: 15px; display: none;">
                    <div class="detail-row">
                        <span>Frames Analyzed:</span>
                        <span id="framesAnalyzed"></span>
                    </div>
                    <div class="detail-row">
                        <span>Fake Frames:</span>
                        <span id="fakeFrames"></span>
                    </div>
                </div>
            </div>

            <button class="reset-btn" id="resetBtn">🔄 Analyze Another File</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const error = document.getElementById('error');
        const resetBtn = document.getElementById('resetBtn');

        let selectedFile = null;

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // File selection
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file) return;

            selectedFile = file;
            fileName.textContent = `📄 ${file.name} (${formatFileSize(file.size)})`;
            fileInfo.classList.add('show');
            result.classList.remove('show');
            error.classList.remove('show');
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // Analyze button
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            loading.classList.add('show');
            result.classList.remove('show');
            error.classList.remove('show');
            analyzeBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/api/detect', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    displayResult(data.result);
                } else {
                    showError(data.error || 'An error occurred during analysis');
                }
            } catch (err) {
                showError('Network error. Please check if the server is running.');
            } finally {
                loading.classList.remove('show');
                analyzeBtn.disabled = false;
            }
        });

        function displayResult(data) {
            const isFake = data.is_deepfake;
            
            result.className = 'result show ' + (isFake ? 'fake' : 'real');
            document.getElementById('resultIcon').textContent = isFake ? '⚠️' : '✅';
            document.getElementById('resultText').textContent = data.prediction;
            document.getElementById('resultConfidence').textContent = 
                `Confidence: ${data.confidence.toFixed(2)}%`;

            document.getElementById('realProb').textContent = 
                `${data.real_probability.toFixed(2)}%`;
            document.getElementById('fakeProb').textContent = 
                `${data.fake_probability.toFixed(2)}%`;

            document.getElementById('realProgress').style.width = 
                `${data.real_probability}%`;
            document.getElementById('realProgress').textContent = 
                `${data.real_probability.toFixed(1)}%`;
            
            document.getElementById('fakeProgress').style.width = 
                `${data.fake_probability}%`;
            document.getElementById('fakeProgress').textContent = 
                `${data.fake_probability.toFixed(1)}%`;

            // Show video details if available
            if (data.frames_analyzed) {
                document.getElementById('videoDetails').style.display = 'block';
                document.getElementById('framesAnalyzed').textContent = data.frames_analyzed;
                document.getElementById('fakeFrames').textContent = 
                    `${data.fake_frames} (${data.fake_ratio.toFixed(1)}%)`;
            } else {
                document.getElementById('videoDetails').style.display = 'none';
            }
        }

        function showError(message) {
            error.textContent = '❌ ' + message;
            error.classList.add('show');
        }

        // Reset button
        resetBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            result.classList.remove('show');
            error.classList.remove('show');
        });
    </script>
</body>
</html>
